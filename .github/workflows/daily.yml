name: Daily Insider Buy Alert

on:
  schedule:
    - cron: '0 22 * * 1-5'   # runs 6pm ET every weekday
  workflow_dispatch:           # also lets you trigger it manually anytime

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python insider_buys.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
